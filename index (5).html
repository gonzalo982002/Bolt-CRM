<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Bolt</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0E0F11;        
    --bg-2:         #131418;
    --surface:      #181A1E;        
    --surface-2:    #1E2126;
    --surface-3:    #24272D;
    --hover:        rgba(255,255,255,0.04);
    --hover-2:      rgba(255,255,255,0.07);
    --line:         rgba(255,255,255,0.07);
    --line-strong:  rgba(255,255,255,0.12);
    --line-soft:    rgba(255,255,255,0.04);
    --ink:          #ECEAE4;
    --ink-2:        #C8C6BF;
    --ink-3:        #8E8B83;
    --ink-4:        #5F5C56;
    --ink-5:        #3A3833;
    --accent:       #E0683F;        
    --accent-2:     #EE8762;
    --accent-soft:  rgba(224,104,63,0.13);
    --accent-soft-strong: rgba(224,104,63,0.20);
    --accent-glow:  rgba(224,104,63,0.30);
    --ok:           #6FA98A;
    --ok-soft:      rgba(111,169,138,0.12);
    --warn:         #C99334;
    --warn-soft:    rgba(201,147,52,0.12);
    --danger:       #C9583B;
    --danger-soft:  rgba(201,88,59,0.12);
    --shadow-1: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-2: 0 1px 2px rgba(0,0,0,0.3), 0 12px 30px -16px rgba(0,0,0,0.6);
    --shadow-modal: 0 30px 90px -30px rgba(0,0,0,0.7);
    --r-1: 8px; --r-2: 12px; --r-3: 16px; --r-4: 20px; --r-5: 24px; --r-6: 30px;
    --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --d-fast: 140ms; --d-base: 260ms; --d-slow: 480ms;
    --font-sans:  'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-mono:  'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
    --font-serif: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  }
  [data-theme="light"] {
    --bg:           #EEF0F4;        
    --bg-2:         #E7EAEF;
    --surface:      #FFFFFF;        
    --surface-2:    #F5F7FA;
    --surface-3:    #EDEFF3;
    --hover:        rgba(22,28,38,0.035);
    --hover-2:      rgba(22,28,38,0.06);
    --line:         rgba(22,28,38,0.08);
    --line-strong:  rgba(22,28,38,0.13);
    --line-soft:    rgba(22,28,38,0.05);
    --ink:          #1C2230;
    --ink-2:        #3A4150;
    --ink-3:        #6B7280;
    --ink-4:        #98A0AD;
    --ink-5:        #C5CAD3;
    --accent:       #DD5E33;
    --accent-2:     #E0683F;
    --accent-soft:  rgba(221,94,51,0.10);
    --accent-soft-strong: rgba(221,94,51,0.16);
    --accent-glow:  rgba(221,94,51,0.22);
    --ok:           #2F9E6E;
    --ok-soft:      rgba(47,158,110,0.11);
    --warn:         #D08A1E;
    --warn-soft:    rgba(208,138,30,0.12);
    --danger:       #D2553A;
    --danger-soft:  rgba(210,85,58,0.11);
    --shadow-1: 0 1px 3px rgba(22,28,38,0.05);
    --shadow-2: 0 2px 6px rgba(22,28,38,0.05), 0 18px 40px -22px rgba(22,28,38,0.18);
    --shadow-modal: 0 30px 80px -30px rgba(22,28,38,0.28);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    color: var(--ink); font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    font-feature-settings: "ss01" 1;
  }
  body {
    min-height: 100vh;
    background: var(--bg);
  }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
  input, textarea, select { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.16); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(127,127,127,0.28); background-clip: padding-box; border: 2px solid transparent; }
  .display { font-size: 40px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.08; }
  .h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.12; }
  .h2 { font-size: 21px; font-weight: 600; letter-spacing: -0.018em; line-height: 1.22; }
  .h3 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; }
  .body { font-size: 14px; font-weight: 400; line-height: 1.45; color: var(--ink); }
  .body-2 { font-size: 13.5px; font-weight: 400; line-height: 1.45; color: var(--ink-2); }
  .meta { font-size: 12px; font-weight: 400; line-height: 1.4; color: var(--ink-3); }
  .micro { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-4); }
  .num { font-feature-settings: "tnum" 1; letter-spacing: -0.01em; }
  .serif { font-weight: 600; letter-spacing: -0.02em; }
  h1, h2, h3, h4, p { margin: 0; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 9px;
    border-radius: 999px;
    font-size: 11px; font-weight: 500;
    background: var(--hover); color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .pill.accent { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft-strong); }
  .pill.ok { background: var(--ok-soft); color: var(--ok); border-color: transparent; }
  .pill.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
  .pill.danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
  .pill .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .btn {
    height: 34px; padding: 0 14px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border: 1px solid var(--line-strong); background: var(--surface);
    color: var(--ink);
    transition: background var(--d-fast) var(--ease-out), border-color var(--d-fast) var(--ease-out), transform 80ms var(--ease-out);
  }
  .btn:hover { background: var(--hover-2); }
  .btn:active { transform: scale(0.98); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--hover); color: var(--ink); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.primary:hover { background: var(--ink-2); }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.accent:hover { background: var(--accent-2); }
  .btn.sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 7px; }
  .btn.lg { height: 40px; padding: 0 18px; font-size: 14px; border-radius: 10px; }
  .btn.icon { width: 34px; padding: 0; }
  .iconbtn {
    width: 30px; height: 30px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-3);
    transition: background var(--d-fast) var(--ease-out), color var(--d-fast) var(--ease-out);
  }
  .iconbtn:hover { background: var(--hover); color: var(--ink); }
  .iconbtn.lg { width: 36px; height: 36px; }
  .input {
    height: 34px; padding: 0 12px;
    border-radius: 8px; font-size: 13px;
    border: 1px solid var(--line-strong);
    background: var(--surface); color: var(--ink);
    outline: none;
    transition: border-color var(--d-fast) var(--ease-out), box-shadow var(--d-fast) var(--ease-out);
  }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .input::placeholder { color: var(--ink-4); }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
  }
  .card-soft {
    background: var(--surface-2);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-3);
  }
  .hover-row { transition: background var(--d-fast) var(--ease-out); }
  .hover-row:hover { background: var(--hover); }
  .avatar {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface-3); color: var(--ink-2);
    font-weight: 500; border-radius: 999px;
    flex-shrink: 0;
  }
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(8,8,10,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn var(--d-base) var(--ease-out);
    padding: 20px;
  }
  .modal {
    background: var(--surface); color: var(--ink);
    border-radius: var(--r-5);
    box-shadow: var(--shadow-modal);
    width: 480px; max-width: 100%;
    border: 1px solid var(--line);
    animation: modalIn var(--d-base) var(--ease-spring);
    max-height: 92vh; overflow-y: auto;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
    transition: grid-template-columns var(--d-base) var(--ease-out);
  }
  .app.has-rail { grid-template-columns: 240px 1fr 340px; }
  .app.sidebar-collapsed { grid-template-columns: 64px 1fr; }
  .app.sidebar-collapsed.has-rail { grid-template-columns: 64px 1fr 340px; }
  aside.nav {
    position: sticky; top: 0; height: 100vh;
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: background var(--d-base) var(--ease-out), border-color var(--d-base) var(--ease-out);
  }
  main.content {
    min-width: 0;
    position: relative;
  }
  aside.rail {
    position: sticky; top: 0; height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--line);
    overflow-y: auto;
  }
  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 56px 48px 80px;
  }
  .page.wide { max-width: 1240px; }
  @media (max-width: 1280px) {
    .page { padding: 40px 36px 60px; }
  }
  @media (max-width: 960px) {
    .app, .app.has-rail { grid-template-columns: 64px 1fr !important; }
    aside.rail { display: none; }
    .page { padding: 32px 28px 60px; }
  }
  @media (max-width: 640px) {
    .app, .app.has-rail { grid-template-columns: 1fr !important; padding-bottom: 80px; }
    aside.nav { display: none; }
    .bottom-nav { display: flex !important; }
    .page { padding: 24px 18px 40px; }
  }
  .bottom-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--bg-2); padding: 8px 12px; gap: 4px;
    border-top: 1px solid var(--line);
    box-shadow: 0 -10px 30px -20px rgba(0,0,0,0.4);
  }
  .bottom-nav > button {
    flex: 1; height: 52px; border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    font-size: 10px; font-weight: 500; color: var(--ink-3);
  }
  .bottom-nav > button.active { color: var(--accent); }
  .slide-fade {
    animation: slideFade var(--d-base) var(--ease-out) both;
  }
  @keyframes slideFade {
    from { transform: translateY(6px); }
    to { transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .slide-fade { animation: none; }
  }
  .chart-tip {
    position: fixed; z-index: 70; pointer-events: none;
    background: var(--surface-3); color: var(--ink);
    border: 1px solid var(--line-strong);
    border-radius: 9px; padding: 9px 12px;
    font-size: 12px; line-height: 1.5;
    box-shadow: var(--shadow-2);
    max-width: 240px;
  }
  .popover {
    position: absolute; z-index: 40;
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: 14px; box-shadow: var(--shadow-2);
    padding: 16px;
    animation: modalIn 200ms var(--ease-spring);
  }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
  .two-col { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; align-items: stretch; }
  .lift { transition: transform var(--d-fast) var(--ease-out), box-shadow var(--d-fast) var(--ease-out), border-color var(--d-fast) var(--ease-out); }
  .lift:hover { transform: translateY(-1px); box-shadow: var(--shadow-2); border-color: var(--line-strong); }
  @media (max-width: 980px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .two-col { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
  }
/* ── Client cards (pastel-tinted, works light + dark) ── */
.client-card {
  position: relative; display: flex; align-items: center; gap: 16px;
  padding: 16px 18px 16px 22px; border-radius: 16px;
  border: 1px solid var(--line); cursor: pointer; overflow: hidden;
  transition: transform var(--d-fast) var(--ease-out), box-shadow var(--d-fast) var(--ease-out), border-color var(--d-fast) var(--ease-out);
}
.client-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-2); }
.client-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.task-chip {
  display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0;
  height: 22px; padding: 0 9px; border-radius: 999px;
  background: var(--hover-2); color: var(--ink-3);
  font-size: 11.5px; font-weight: 600;
}
/* ── Segmented filter (clients) ── */
.seg-wrap { display: flex; gap: 4px; flex-wrap: wrap; padding: 4px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; width: fit-content; max-width: 100%; }
.seg {
  display: inline-flex; align-items: center; gap: 7px;
  height: 32px; padding: 0 13px; border-radius: 9px;
  font-size: 12.5px; font-weight: 500; color: var(--ink-3);
  transition: background var(--d-fast) var(--ease-out), color var(--d-fast) var(--ease-out);
}
.seg:hover { color: var(--ink); }
.seg-active { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: var(--shadow-1); }
.seg-count { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 999px; background: var(--hover-2); color: var(--ink-4); }
.seg-active .seg-count { background: var(--accent-soft); color: var(--accent); }
/* ── Pill toggle (calendar mes/semana) ── */
.seg-pill { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; padding: 2px; }
.seg-pill-btn { height: 28px; padding: 0 12px; border-radius: 7px; font-size: 12px; font-weight: 500; color: var(--ink-3); }
.seg-pill-btn.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }
/* ── Calendar layout ── */
.cal-layout { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }
.cal-side { position: sticky; top: 24px; }
@media (max-width: 1100px) { .cal-layout { grid-template-columns: 1fr; } .cal-side { position: static; } }

/* ── BOLT assistant console ── */
.bolt-console {
  display: grid; grid-template-columns: auto 1fr auto; gap: 26px; align-items: center;
  padding: 26px 28px; border-radius: 22px;
  background: var(--surface);
  border: 1px solid var(--line);
  position: relative; overflow: hidden;
  animation: boltIn 600ms var(--ease-out) both;
}
.bolt-console::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(420px 180px at 12% 30%, var(--accent-soft), transparent 70%);
  opacity: 0.9;
}
@keyframes boltIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.bolt-orb { position: relative; width: 118px; height: 118px; cursor: pointer; flex-shrink: 0; filter: drop-shadow(0 0 18px var(--accent-glow)); transition: transform var(--d-base) var(--ease-spring); }
.bolt-orb:hover { transform: scale(1.04); }
.bolt-orb .core { transform-origin: 60px 60px; animation: corePulse 2.6s var(--ease-out) infinite; }
.bolt-orb .ring { transform-origin: 60px 60px; }
.bolt-orb .ring-1 { animation: spin 18s linear infinite; }
.bolt-orb .ring-2 { animation: spin 9s linear infinite reverse; }
.bolt-orb .ring-3 { animation: spin 5s linear infinite; }
.bolt-orb.pulse { animation: orbPulse 1.1s var(--ease-out) infinite; }
.bolt-orb.listening .core { animation: corePulse 0.7s var(--ease-out) infinite; }
.bolt-orb.listening { filter: drop-shadow(0 0 26px var(--accent-glow)); }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes corePulse { 0%,100% { opacity: 0.9; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
@keyframes orbPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
.bolt-wave { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 3px; }
.bolt-wave span { width: 3px; height: 10px; border-radius: 3px; background: #fff; opacity: 0.85; animation: wave 0.9s ease-in-out infinite; }
.bolt-wave span:nth-child(2){ animation-delay: 0.1s } .bolt-wave span:nth-child(3){ animation-delay: 0.2s } .bolt-wave span:nth-child(4){ animation-delay: 0.3s } .bolt-wave span:nth-child(5){ animation-delay: 0.15s }
@keyframes wave { 0%,100% { height: 8px } 50% { height: 26px } }
.bolt-text { min-width: 0; position: relative; z-index: 1; }
.bolt-greet { font-size: 32px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.1; color: var(--ink); }
.bolt-caret { color: var(--accent); animation: blink 1s steps(1) infinite; font-weight: 400; }
@keyframes blink { 50% { opacity: 0; } }
.bolt-brief { font-size: 14px; color: var(--ink-2); line-height: 1.5; margin-top: 10px; min-height: 21px; max-width: 640px; }
.bolt-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.bolt-mic {
  display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 16px; border-radius: 999px;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
  box-shadow: 0 6px 18px -8px var(--accent-glow); transition: transform var(--d-fast) var(--ease-out), background var(--d-fast) var(--ease-out);
}
.bolt-mic:hover { transform: translateY(-1px); }
.bolt-mic.on { background: var(--danger); }
.bolt-chip {
  height: 36px; padding: 0 14px; border-radius: 999px; font-size: 12.5px; font-weight: 500;
  background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-2);
  transition: background var(--d-fast) var(--ease-out), border-color var(--d-fast) var(--ease-out), transform var(--d-fast) var(--ease-out);
}
.bolt-chip:hover { background: var(--hover-2); color: var(--ink); transform: translateY(-1px); }
.bolt-cta { display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 1; }
@media (max-width: 920px) {
  .bolt-console { grid-template-columns: 1fr; text-align: left; }
  .bolt-cta { flex-direction: row; }
}
/* pending-task pulse when Bolt points them out */
.task-highlight { animation: taskPulse 1.4s var(--ease-out) 3; box-shadow: inset 0 0 0 1.5px var(--accent); border-radius: 10px; }
@keyframes taskPulse { 0%,100% { background: transparent; } 50% { background: var(--accent-soft); } }
/* global fluidity: gentler page transition + interactive easing */
.slide-fade { animation: slideFade 360ms var(--ease-out) both; }
@keyframes slideFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.btn, .iconbtn, .seg, .client-card, .bolt-chip { will-change: transform; }
.btn:active, .bolt-chip:active, .seg:active { transform: scale(0.97); }
@media (prefers-reduced-motion: reduce) {
  .bolt-orb .ring, .bolt-orb .core, .bolt-orb.pulse, .bolt-wave span, .bolt-caret, .task-highlight { animation: none !important; }
  .slide-fade, .bolt-console { animation: none !important; }
}

/* ── BOLT floating assistant ── */
.bolt-fab-wrap { position: fixed; right: 22px; bottom: 22px; z-index: 60; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
@media (max-width: 640px){ .bolt-fab-wrap { bottom: 86px; right: 14px; } }
.bolt-fab {
  width: 58px; height: 58px; border-radius: 999px;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 30px -10px var(--accent-glow), 0 0 0 1px var(--accent);
  transition: transform var(--d-base) var(--ease-spring), background var(--d-fast) var(--ease-out);
